schemaVersion: 1
feature:
  id: tmua-evidence-safe-guest-profile
  title: TMUA evidence-safe Guest preparation foundation
  status: verified
  verifiedAt: 2026-07-19
  userOutcome: >-
    A student can enter the TMUA space without an account, describe an exact
    CAIE, Pearson IAL, IB or AP mathematics starting point, keep that profile
    inside the current Guest or authenticated Learner Space, and begin or
    resume a timed native paper with honest storage and evidence boundaries.

run:
  packageScript: verify

claims:
  - id: evidence-safe-timing
    status: verified
    statement: >-
      Active-page time and the 75-minute paper limit are kept separately;
      background time is not presented as thinking time and clock rollback
      cannot extend the paper.
    artifacts:
      - src/features/practice/domain/session.ts
      - src/features/practice/pages/PracticePage.tsx
      - tests/features/practice/domain/session.test.ts
      - tests/app/practice-page.test.tsx
    automatedChecks:
      - test
      - typecheck

  - id: local-guest-ownership
    status: verified
    statement: >-
      Practice sessions and preparation profiles are owned by a stable local
      Guest Space and records from another Guest Space are not resumed.
    artifacts:
      - src/platform/learning-space/domain.ts
      - src/features/guest-space/storage/local-store.ts
      - src/features/practice/storage/local-store.ts
      - tests/app/tmua-hub-page.test.tsx
    automatedChecks:
      - verify:architecture
      - test

  - id: exact-preparation-profile
    status: verified
    statement: >-
      Entry cycle, curriculum system, qualification, qualification-scoped
      modules and prior practice experience are stored without inventing
      knowledge coverage or readiness scores.
    artifacts:
      - src/features/preparation-profile/catalog.ts
      - content/official/curriculum-source-registry.json
      - src/features/preparation-profile/domain.ts
      - src/features/preparation-profile/storage/local-store.ts
      - src/features/preparation-profile/components/ProfilePanel.tsx
      - tests/features/preparation-profile/domain.test.ts
      - tests/content/official/curriculum-source-registry.test.ts
      - tests/features/preparation-profile/storage/local-store.test.ts
      - tests/features/preparation-profile/components/profile-panel.test.tsx
    automatedChecks:
      - verify:curriculum-sources
      - test
      - typecheck

  - id: responsive-progressive-interface
    status: verified
    statement: >-
      Public exam information remains available before a profile, the local
      course profile is required before personalised module choices, AI is
      absent from the first interaction, and the editorial layout adapts
      across desktop, tablet and phone widths.
    artifacts:
      - src/styles/practice.css
      - tests/app/front-door-accessibility.test.tsx
      - tests/app/front-door-css-contract.test.ts
    automatedChecks:
      - test
      - build

  - id: pdf-to-question-staging
    status: verified
    statement: >-
      A read-only TMUA question paper, official answer key and worked-solution
      PDF can be converted into source-linked per-question JSON revisions and
      an upload-ready bundle without making auto-extracted content publishable.
    artifacts:
      - src/content/tmua/extract-cli.ts
      - src/content/tmua/extraction.ts
      - src/content/tmua/verify-extractions.ts
      - content/tmua/schemas/question-revision.schema.json
      - content/tmua/staging/tmua-2022-p1/bundle.json
      - tests/content/tmua/extraction.test.ts
      - tests/content/tmua/extraction-staging.test.ts
    automatedChecks:
      - verify:tmua-extractions
      - test
      - typecheck

boundaries:
  - This is local browser persistence, not production server storage.
  - Guest Space isolation is not a claim of production multi-tenant RLS.
  - Course coverage is limited to the versioned CAIE/Pearson/IB/AP mapping; practical readiness remains unknown until learner evidence exists.
  - >-
    An official source URL is not treated as a local asset: the AP files have
    verified internal hashes, while the IB origin-blocked files remain
    explicitly un-downloaded.
  - All 18 TMUA papers and 360 questions use native structured delivery; complete source PDFs are not exposed by the public practice runtime.
  - Extraction staging for all remaining source papers stays non-publishable review evidence; separately reviewed typed datasets are the published student content.
  - No benchmark, admissions probability, paid interpretation or AI recommendation is produced by this feature.

manualChecks:
  - id: responsive-viewport-review
    status: passed
    reviewer: codex-agent
    reviewerRole: interface-qa
    checkedAt: 2026-07-14
    evidence: Browser-rendered profile layout with no horizontal content overflow.
    viewports:
      - 1440x900
      - 768x1024
      - 390x844
