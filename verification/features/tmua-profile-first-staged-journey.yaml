schemaVersion: 1
feature:
  id: tmua-profile-first-staged-journey
  title: TMUA profile-first staged preparation journey
  status: partial
  userOutcome: >-
    A student can read the public TMUA overview, establish a local course
    profile, receive a deterministic course-coverage report, and then choose
    separate diagnostic, practice, past-paper or resource pages.

run:
  packageScript: verify

claims:
  - id: separate-staged-pages
    status: verified
    statement: >-
      Public overview, profile, coverage, dashboard, diagnostic explanation,
      past-paper archive and resource access use separate routes, and the
      personalised dashboard is not shown without a preparation profile. The
      past-paper archive remains public so students can inspect the corpus
      before sharing course information.
    artifacts:
      - src/app/routes.tsx
      - src/features/catalog/pages/TmuaHubPage.tsx
      - src/features/catalog/pages/TmuaDashboardPage.tsx
      - src/features/catalog/pages/TmuaDiagnosticPage.tsx
      - src/features/catalog/pages/TmuaPastPapersPage.tsx
      - src/features/library/pages/LearningLibraryPage.tsx
      - src/features/preparation-profile/pages/TmuaProfilePage.tsx
      - src/features/preparation-profile/pages/TmuaCoveragePage.tsx
      - src/features/preparation-profile/components/PreparationProfileGate.tsx
      - tests/app/tmua-hub-page.test.tsx
    automatedChecks:
      - test
      - typecheck
      - build

  - id: public-imported-past-paper-catalog
    status: verified
    statement: >-
      Every one of the 18 imported TMUA papers is visible in a nine-card public
      archive and links directly to a timed native online session. Each edition
      exposes Paper 1 and Paper 2 without status-column clutter; none is
      presented as unfinished or delivered as a complete PDF.
    artifacts:
      - content/tmua/public-summary.json
      - content/tmua/online-papers.json
      - src/features/practice/content/tmua-2023-p2.ts
      - src/features/catalog/tmua-summary.ts
      - src/features/catalog/pages/TmuaPastPapersPage.tsx
      - src/features/practice/content/tmua-online-registry.ts
      - tests/app/tmua-hub-page.test.tsx
      - tests/features/practice/content/online-papers.test.ts
    automatedChecks:
      - verify:tmua-corpus
      - verify:tmua-online-papers
      - test
      - typecheck

  - id: deterministic-course-coverage
    status: verified
    statement: >-
      CAIE, Pearson IAL, IB AA/AI SL/HL and AP Precalculus/Calculus module
      selections produce a versioned zero-token report
      that gives bilingual topic names, explicit review/check/learn decisions,
      concrete study topics and conservative teacher-planning time ranges while
      distinguishing course evidence from mastery, readiness, official scores,
      benchmark time estimates and AI output.
    artifacts:
      - src/features/preparation-profile/coverage.ts
      - src/features/preparation-profile/catalog.ts
      - content/official/curriculum-source-registry.json
      - supabase/migrations/20260719113000_tmua_ib_ap_profiles.sql
      - tests/content/official/curriculum-source-registry.test.ts
      - tests/features/preparation-profile/coverage.test.ts
      - tests/features/preparation-profile/catalog.test.ts
      - tests/features/preparation-profile/components/profile-panel.test.tsx
      - src/features/preparation-profile/pages/TmuaCoveragePage.tsx
      - docs/architecture/SYSTEM_ARCHITECTURE.md
    automatedChecks:
      - verify:architecture
      - verify:curriculum-sources
      - test
      - typecheck

  - id: actionable-dashboard-primary
    status: verified
    statement: >-
      The personalised dashboard links to the complete native paper archive and
      keeps 2023 Paper 1 as the primary one-click practice; the unreviewed
      diagnostic and admissions registry remain honest upcoming states and do
      not create a primary-action dead end.
    artifacts:
      - src/features/catalog/pages/TmuaDashboardPage.tsx
      - src/features/catalog/pages/TmuaDiagnosticPage.tsx
      - tests/app/tmua-hub-page.test.tsx
      - tests/app/front-door-css-contract.test.ts
    automatedChecks:
      - test
      - typecheck
      - build

boundaries:
  - The current mapping covers the configured CAIE, Pearson IAL, IB Mathematics and AP mathematics units only; a course title or completed unit is curriculum evidence, not proof of mastery.
  - IB AI and calculator-led AP content are conservatively mapped as related where exact non-calculator transfer still needs checking; AP Calculus does not silently imply Algebra II, Geometry or TMUA formal-logic coverage.
  - The AP curriculum PDFs are retained only in the Git-ignored internal research workspace; the IB origin currently blocks automated local retrieval, which remains explicit in the curriculum source registry rather than being represented as a downloaded asset.
  - Course coverage is not practical readiness and does not replace the 30-minute diagnostic.
  - The 8-question original diagnostic form is still under independent review and cannot yet be started.
  - This is local Guest Space persistence, not production identity, server storage or multi-tenant isolation.
  - Direct practice entry is profile-gated, but the nine-card past-paper catalog is public; result routes remain recoverable from an existing submitted session.

manualChecks:
  - id: staged-responsive-route-review
    status: pending
    evidence: Review the new overview, profile, coverage, dashboard and module pages at desktop, tablet and phone sizes.
    viewports:
      - 1440x900
      - 768x1024
      - 390x844
