<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 430" role="img" aria-labelledby="title desc" style="color:#282332">
  <title id="title">Nested circles with alternating shaded regions</title>
  <desc id="desc">Coordinate axes and four circles tangent at the origin, with centres along y equals x. The annulus between the first and second circles and the annulus between the third and fourth circles are shaded.</desc>
  <g stroke="currentColor" stroke-width="2.5">
    <circle cx="195" cy="230" r="155.56" fill="#d8d4df"/>
    <circle cx="167.5" cy="257.5" r="116.67" fill="#fffdf8"/>
    <circle cx="140" cy="285" r="77.78" fill="#d8d4df"/>
    <circle cx="112.5" cy="312.5" r="38.89" fill="#fffdf8"/>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="2">
    <path d="M28 340 H440"/>
    <path d="M432 333 L440 340 L432 347"/>
    <path d="M85 397 V32"/>
    <path d="M78 40 L85 32 L92 40"/>
  </g>
  <g fill="currentColor" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-style="italic">
    <text x="445" y="350">x</text>
    <text x="64" y="38">y</text>
  </g>
  <circle cx="85" cy="340" r="3.5" fill="currentColor"/>
  <text x="240" y="421" text-anchor="middle" fill="currentColor" font-family="Arial, sans-serif" font-size="18">[diagram not to scale]</text>
</svg>
