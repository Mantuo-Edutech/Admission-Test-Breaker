<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440" role="img" aria-labelledby="title desc" style="color:#282332">
  <title id="title">Square MNOP and rectangle RSTU</title>
  <desc id="desc">A square contains a tilted rectangle. R lies on side MN, S on NO, T on OP, and U on PM. The shape has diagonal reflectional symmetry along two axes.</desc>
  <rect x="90" y="55" width="300" height="300" fill="#d9d6dc" stroke="currentColor" stroke-width="3"/>
  <path d="M90 280 L315 55 L390 130 L165 355 Z" fill="#fffdf8" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
  <g fill="currentColor" font-family="Georgia, 'Times New Roman', serif" font-size="25" font-style="italic">
    <text x="64" y="51">N</text>
    <text x="397" y="51">O</text>
    <text x="397" y="382">P</text>
    <text x="64" y="382">M</text>
    <text x="62" y="287">R</text>
    <text x="307" y="46">S</text>
    <text x="400" y="137">T</text>
    <text x="157" y="383">U</text>
  </g>
  <text x="240" y="420" text-anchor="middle" fill="currentColor" font-family="Arial, sans-serif" font-size="18">[diagram not to scale]</text>
</svg>
