<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 840" role="img" aria-labelledby="title desc"><title id="title">Eight shaded region choices</title><desc id="desc">Options A to H show different regions around the rays q equals 2p and q equals minus 2p for positive p.</desc><defs><g id="grid" fill="none" stroke="#9b978f" stroke-width="1"><path d="M20 100H210M100 15V195"/><path d="M45 20V190M70 20V190M125 20V190M150 20V190M175 20V190M25 45H205M25 70H205M25 125H205M25 150H205M25 175H205"/><path d="M100 100L150 20M100 100L150 180" stroke="#252137" stroke-dasharray="5 5"/></g></defs><g stroke="#252137"><g transform="translate(0 0)"><rect x="100" y="20" width="105" height="160" fill="#d6d3cf"/><use href="#grid"/></g><g transform="translate(280 0)"><polygon points="100,100 150,20 100,20" fill="#d6d3cf"/><use href="#grid"/></g><g transform="translate(560 0)"><polygon points="100,100 150,20 205,20 205,180 100,180" fill="#d6d3cf"/><use href="#grid"/></g><g transform="translate(0 280)"><polygon points="100,100 150,20 205,20 205,100" fill="#d6d3cf"/><use href="#grid"/></g><g transform="translate(280 280)"><polygon points="100,100 150,20 205,20 205,180 150,180" fill="#d6d3cf"/><use href="#grid"/></g><g transform="translate(560 280)"><polygon points="100,100 150,20 100,20" fill="#d6d3cf"/><polygon points="100,100 150,180 100,180" fill="#d6d3cf"/><use href="#grid"/></g><g transform="translate(0 560)"><polygon points="100,100 150,20 205,20 205,180 150,180" fill="#d6d3cf"/><use href="#grid"/></g><g transform="translate(280 560)"><polygon points="100,100 150,20 100,20" fill="#d6d3cf"/><polygon points="100,100 150,180 100,180" fill="#d6d3cf"/><use href="#grid"/></g></g><g fill="#252137" font-family="Georgia,serif" font-size="22"><text x="8" y="25">A</text><text x="288" y="25">B</text><text x="568" y="25">C</text><text x="8" y="305">D</text><text x="288" y="305">E</text><text x="568" y="305">F</text><text x="8" y="585">G</text><text x="288" y="585">H</text></g></svg>
