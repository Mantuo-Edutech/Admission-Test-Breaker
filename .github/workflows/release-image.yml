name: Release immutable image

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment whose approval rules guard this release
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mantuo-edutech/admission-test-breaker:${{ github.sha }}
      - name: Record immutable release
        run: |
          echo "Environment: ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ghcr.io/mantuo-edutech/admission-test-breaker:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow publishes an immutable artifact; server promotion and post-deploy verification remain separately approved actions." >> "$GITHUB_STEP_SUMMARY"
