name: Deploy Supabase environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Approved target environment
        required: true
        type: choice
        options:
          - staging
          - production
      release_sha:
        description: Full commit SHA already verified and released as a web image
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:supabase-contracts
      - run: pnpm verify:production-platform
      - name: Link approved Supabase project
        run: pnpm exec supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Show migration plan
        run: pnpm supabase:migrations:plan
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Apply reviewed migrations
        run: pnpm supabase:migrations:apply
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Enforce Auth bot protection
        run: pnpm supabase:auth-protection:apply
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          PUBLIC_APP_ORIGIN: ${{ vars.PUBLIC_APP_ORIGIN }}
      - name: Configure trusted Auth SMTP
        run: pnpm supabase:auth-smtp:apply
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_ADMIN_EMAIL: ${{ vars.SMTP_ADMIN_EMAIL }}
          SMTP_SENDER_NAME: ${{ vars.SMTP_SENDER_NAME }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
      - name: Configure allowed browser origin
        run: pnpm exec supabase secrets set "ALLOWED_ORIGINS=$PUBLIC_APP_ORIGIN" --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          PUBLIC_APP_ORIGIN: ${{ vars.PUBLIC_APP_ORIGIN }}
      - name: Deploy invite preview function
        run: pnpm exec supabase functions deploy invite-preview --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Record deployment boundary
        run: |
          echo "Supabase target: ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Release: ${{ inputs.release_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Migrations, Auth bot protection, custom SMTP and invite-preview were deployed. Real email delivery, remote permission journey and backup evidence must still be attached before Beta approval." >> "$GITHUB_STEP_SUMMARY"
